<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO -->
  <title>🥤 Магазин напитков — купить вкусные напитки с доставкой</title>
  <meta name="description" content="Широкий ассортимент газировок, соков, воды, энергетиков и чая. Быстрая доставка по Москве и России. Заказывайте напитки онлайн!">
  <meta name="keywords" content="магазин напитков, купить напитки, доставка напитков, газировка, сок, вода, энергетик, чай, кофе">
  
  <!-- Open Graph (для соцсетей) -->
  <meta property="og:title" content="Магазин напитков — купить вкусные напитки">
  <meta property="og:description" content="Широкий ассортимент напитков с доставкой. Заказывайте онлайн!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://drink-store-2-172-1.onrender.com/">
  <meta property="og:image" content="https://drink-store-2-172-1.onrender.com/logo.png">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥤</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Боковой хедер -->
<div class="side-header">
  <a href="/about.html" class="side-link" title="О нас">ℹ️</a>
  <a href="/contacts.html" class="side-link" title="Контакты">📞</a>
  <a href="https://wa.me/79123456789?text=Здравствуйте!%20У%20меня%20есть%20вопрос" target="_blank" class="side-link whatsapp" title="WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="#25D366">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>
</div>

<div class="container">
  <header class="header">
    <h1>🥤 <span>Drink</span>Store</h1>
    <div class="header-actions">
      <!-- Кнопка корзины -->
      <button class="cart-btn" id="openCartBtn">🛒 <span class="badge" id="cartCount">0</span></button>
      <!-- Уведомления -->
      <button id="notifBtn" class="admin-btn" style="background:#f39c12; position:relative; padding:8px 16px;">
        🔔 <span id="notifBadge" style="position:absolute; top:-5px; right:-5px; background:#e74c3c; color:white; border-radius:50%; padding:2px 6px; font-size:12px; display:none;">0</span>
      </button>
      <!-- Кнопки входа/регистрации -->
      <div id="authButtons">
        <button id="loginBtn" class="admin-btn" style="background:#3498db;">Войти</button>
        <button id="registerBtn" class="admin-btn" style="background:#2ecc71;">Регистрация</button>
      </div>
      <!-- Информация о пользователе (скрыта) -->
      <div id="userInfo" style="display:none; align-items:center; gap:10px;">
        <span id="userName" style="color:#2c3e50; font-weight:600;"></span>
        <a href="/profile.html" class="admin-btn" style="background:#9b59b6; text-decoration:none;">👤 Профиль</a>
        <button id="logoutBtn" class="admin-btn" style="background:#e74c3c;">Выйти</button>
      </div>
      <!-- Кнопка админки (скрыта) -->
      <a href="admin.html" class="admin-btn" id="adminLink" style="display:none;">⚙️ Админка</a>
    </div>
  </header>

  <!-- Фильтр и поиск -->
  <div class="filter-section">
    <label for="categoryFilter">Категория:</label>
    <select id="categoryFilter"><option value="all">Все</option></select>
    <input type="text" id="searchInput" placeholder="🔍 Поиск..." style="flex:1; min-width:150px; padding:10px 20px; border:2px solid rgba(255,255,255,0.3); border-radius:30px; outline:none; font-size:15px; background:rgba(255,255,255,0.5); backdrop-filter:blur(5px);">
    <button class="reset-btn" id="resetFilterBtn">Сбросить</button>
  </div>

  <!-- Список товаров -->
  <div class="products-grid" id="productsGrid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Корзина (модалка) -->
<div class="cart-overlay" id="cartOverlay">
  <div class="cart-panel">
    <div class="cart-header">
      <h2>🛒 Корзина</h2>
      <button class="close-btn" id="closeCartBtn">&times;</button>
    </div>
    <ul class="cart-items" id="cartItems"></ul>
    <div class="cart-total">
      <span>Итого:</span>
      <span id="cartTotal">0 ₽</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn">Оформить заказ</button>
  </div>
</div>

<!-- Модалка входа -->
<div class="auth-overlay" id="loginOverlay">
  <div class="auth-panel">
    <div class="auth-header">
      <h2>🔐 Вход</h2>
      <button class="close-btn" id="closeLoginBtn">&times;</button>
    </div>
    <form id="loginForm">
      <input type="text" id="loginInput" placeholder="Логин" required>
      <input type="password" id="passwordInput" placeholder="Пароль" required>
      <button type="submit">Войти</button>
    </form>
    <div id="loginError" style="color:red; margin-top:10px;"></div>
    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <button id="forgotLoginBtn" style="background:none; border:none; color:#3498db; cursor:pointer;">Забыли логин?</button>
      <button id="forgotPasswordBtn" style="background:none; border:none; color:#3498db; cursor:pointer;">Забыли пароль?</button>
    </div>
  </div>
</div>

<!-- Модалка регистрации -->
<div class="auth-overlay" id="registerOverlay">
  <div class="auth-panel">
    <div class="auth-header">
      <h2>📝 Регистрация</h2>
      <button class="close-btn" id="closeRegisterBtn">&times;</button>
    </div>
    <form id="registerForm">
      <input type="text" id="regFirstName" placeholder="Имя" required>
      <input type="text" id="regLastName" placeholder="Фамилия" required>
      <input type="text" id="regLogin" placeholder="Логин" required>
      <input type="password" id="regPassword" placeholder="Пароль" required>
      <button type="submit">Зарегистрироваться</button>
    </form>
    <div id="registerError" style="color:red; margin-top:10px;"></div>
  </div>
</div>

<!-- Модалка восстановления -->
<div class="auth-overlay" id="recoverOverlay">
  <div class="auth-panel">
    <div class="auth-header">
      <h2>🔑 Восстановление</h2>
      <button class="close-btn" id="closeRecoverBtn">&times;</button>
    </div>
    <div id="recoverStep1">
      <p>Введите имя и фамилию для поиска</p>
      <input type="text" id="recoverFirstName" placeholder="Имя">
      <input type="text" id="recoverLastName" placeholder="Фамилия">
      <button id="recoverSearchBtn">Найти</button>
    </div>
    <div id="recoverStep2" style="display:none;">
      <p>Найден логин: <strong id="recoveredLogin"></strong></p>
      <div id="resetPasswordSection">
        <p>Введите новый пароль, чтобы его сбросить</p>
        <input type="password" id="recoverNewPassword" placeholder="Новый пароль">
        <button id="recoverResetBtn">Сбросить пароль</button>
      </div>
    </div>
    <div id="recoverMessage" style="color:green; margin-top:10px;"></div>
    <div id="recoverError" style="color:red; margin-top:10px;"></div>
  </div>
</div>

<!-- Модалка уведомлений -->
<div class="auth-overlay" id="notifOverlay">
  <div class="auth-panel" style="max-width:500px;">
    <div class="auth-header">
      <h2>🔔 Уведомления</h2>
      <button class="close-btn" id="closeNotifBtn">&times;</button>
    </div>
    <div id="notifList"></div>
    <button id="markReadBtn" style="margin-top:10px; background:#27ae60; color:white; border:none; padding:10px; border-radius:50px; width:100%; font-weight:600;">Отметить все как прочитанные</button>
  </div>
</div>

<!-- Модалка новостей -->
<div class="auth-overlay" id="newsOverlay">
  <div class="auth-panel" style="max-width:600px;">
    <div class="auth-header">
      <h2>📢 Новости и акции</h2>
      <button class="close-btn" id="closeNewsBtn">&times;</button>
    </div>
    <div id="newsContent"></div>
    <button id="newsCloseBtn" style="background:#27ae60; color:white; border:none; padding:10px 20px; border-radius:50px; margin-top:15px; width:100%;">Закрыть</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
